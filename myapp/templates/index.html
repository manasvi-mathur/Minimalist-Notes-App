<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Notes App</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Outfit', sans-serif;
            color: #1e293b;
        }
        .container {
            max-width: 700px;
        }
        h1 {
            font-weight: 600;
            color: #0f172a;
            margin-bottom: 2rem;
        }
        .btn-primary {
            background-color: #2563eb;
            border: none;
        }
        .btn-primary:hover {
            background-color: #1d4ed8;
        }
        .note-card {
            background: white;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .note-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border-color: #cbd5e1;
        }
        .input-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: none;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }
        .form-control {
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            padding: 12px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
            border-color: #2563eb;
        }
        .search-container {
            margin-bottom: 2rem;
        }
        /* Stats Styling */
        #statsOverlay {
            position: fixed;
            bottom: 20px;
            left: 20px;
            background: #ffffff;
            padding: 12px 18px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            font-size: 0.85rem;
            z-index: 1000;
            color: #64748b;
        }
        .stats-val {
            color: #0f172a;
            font-weight: 600;
        }
        .error-feedback {
            color: #dc2626;
            font-size: 0.8rem;
            margin-top: 5px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container mt-5 mb-5">
        <h1 class="text-center">My Notes</h1>
        
        <!-- Search Bar -->
        <div class="search-container">
            <input type="text" id="searchInput" class="form-control" placeholder="Search notes...">
        </div>

        <!-- Input Section -->
        <div class="input-card mb-5">
            <div class="input-group">
                <input type="text" id="noteInput" class="form-control me-2" placeholder="Type a new note...">
                <button class="btn btn-primary px-4" id="addBtn">Add</button>
            </div>
            <div id="addError" class="error-feedback">Note content cannot be empty!</div>
        </div>

        <!-- Notes List -->
        <div id="notesList">
            <!-- Notes will be loaded here via AJAX -->
        </div>
    </div>

    <!-- Stats Overlay -->
    <div id="statsOverlay">
        <div>Total Notes: <span id="totalNotes" class="stats-val">0</span></div>
        <div>Words Stored: <span id="totalWords" class="stats-val">0</span></div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 shadow-lg" style="border-radius: 16px;">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold">Edit Note</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="editNoteId">
                    <textarea id="editNoteContent" class="form-control" rows="4"></textarea>
                    <div id="editError" class="error-feedback">Note content cannot be empty!</div>
                </div>
                <div class="modal-footer border-0 pt-0">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary px-4" id="saveEditBtn">Save Changes</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        $(document).ready(function() {
            loadNotes();

            // Add note with validation
            $('#addBtn').click(function() {
                var content = $('#noteInput').val().trim();
                if (!content) {
                    $('#addError').fadeIn().delay(2000).fadeOut();
                    $('#noteInput').addClass('is-invalid');
                    setTimeout(() => $('#noteInput').removeClass('is-invalid'), 2000);
                    return;
                }
                
                $.ajax({
                    url: '/api/add/',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ content: content }),
                    success: function(response) {
                        $('#noteInput').val('');
                        loadNotes();
                    }
                });
            });

            // Search notes
            $('#searchInput').on('input', function() {
                var query = $(this).val().toLowerCase();
                $('.note-card').each(function() {
                    var text = $(this).find('.note-text').text().toLowerCase();
                    $(this).toggle(text.indexOf(query) > -1);
                });
            });

            // Save edited note with validation
            $('#saveEditBtn').click(function() {
                var id = $('#editNoteId').val();
                var content = $('#editNoteContent').val().trim();
                if (!content) {
                    $('#editError').fadeIn().delay(2000).fadeOut();
                    $('#editNoteContent').addClass('is-invalid');
                    setTimeout(() => $('#editNoteContent').removeClass('is-invalid'), 2000);
                    return;
                }

                $.ajax({
                    url: '/api/update/' + id + '/',
                    type: 'POST',
                    contentType: 'application/json',
                    data: JSON.stringify({ content: content }),
                    success: function(response) {
                        $('#editModal').modal('hide');
                        loadNotes();
                    }
                });
            });
        });

        function loadNotes() {
            $.ajax({
                url: '/api/notes/',
                type: 'GET',
                success: function(notes) {
                    var html = '';
                    var wordCount = 0;
                    
                    notes.forEach(function(note, index) {
                        // Calculate word count
                        var words = note.content.trim().split(/\s+/).filter(w => w.length > 0);
                        wordCount += words.length;

                        html += `
                            <div class="note-card card mb-3 p-1" style="animation-delay: ${index * 0.05}s">
                                <div class="card-body d-flex justify-content-between align-items-center">
                                    <span class="note-text text-break me-3">${note.content}</span>
                                    <div class="d-flex gap-2">
                                        <button class="btn btn-light btn-sm text-primary" onclick="openEditModal(${note.id}, '${note.content.replace(/'/g, "\\'")}')">Edit</button>
                                        <button class="btn btn-light btn-sm text-danger" onclick="deleteNote(${note.id})">Delete</button>
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    $('#notesList').html(html);
                    
                    // Update Stats
                    $('#totalNotes').text(notes.length);
                    $('#totalWords').text(wordCount);
                    
                    // Re-apply search filter if user was searching
                    $('#searchInput').trigger('input');
                }
            });
        }

        function openEditModal(id, content) {
            $('#editNoteId').val(id);
            $('#editNoteContent').val(content);
            $('#editModal').modal('show');
        }

        function deleteNote(id) {
            if(confirm('Are you sure you want to delete this note?')) {
                $.ajax({
                    url: '/api/delete/' + id + '/',
                    type: 'DELETE',
                    success: function(response) {
                        loadNotes();
                    }
                });
            }
        }
    </script>
</body>
</html>
